<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aysha's Choice - Admin Panel</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.92), rgba(30, 41, 59, 0.92)), 
                  url('https://images.unsplash.com/photo-1557683316-973673baf926?q=80&w=2000');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #f8fafc;
      padding: 30px 20px;
      min-height: 100vh;
    }

    .layout { 
      display: flex; 
      gap: 25px; 
      max-width: 1250px; 
      margin: 0 auto; 
      flex-wrap: wrap; 
    }

    .container { 
      flex: 1; 
      min-width: 320px; 
      background: rgba(30, 41, 59, 0.75); 
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 25px; 
      border-radius: 16px; 
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35); 
      margin-bottom: 25px; 
    }

    h2 { 
      text-align: center; 
      color: #f1f5f9; 
      margin-bottom: 22px; 
      font-size: 22px; 
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .form-group { margin-bottom: 18px; }

    label { 
      display: block; 
      font-weight: 600; 
      margin-bottom: 8px; 
      color: #cbd5e1; 
      font-size: 14px;
    }

    input, textarea, select { 
      width: 100%; 
      padding: 12px 14px; 
      border: 1px solid rgba(255, 255, 255, 0.15); 
      border-radius: 8px; 
      background: rgba(15, 23, 42, 0.6);
      color: #f8fafc;
      font-size: 14px;
      outline: none;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    input:focus, textarea:focus, select:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.25);
    }

    input::placeholder, textarea::placeholder {
      color: #64748b;
    }

    select option {
      background: #1e293b;
      color: #f8fafc;
    }

    button { 
      width: 100%; 
      padding: 12px; 
      background: linear-gradient(135deg, #10b981, #059669); 
      color: white; 
      border: none; 
      border-radius: 8px; 
      font-size: 15px; 
      font-weight: bold; 
      cursor: pointer; 
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover { 
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
    }

    #msg { margin-top: 15px; text-align: center; font-weight: bold; }
    
    /* Tables */
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    
    th, td { 
      padding: 12px; 
      border-bottom: 1px solid rgba(255, 255, 255, 0.08); 
      text-align: left; 
      font-size: 14px; 
      color: #e2e8f0;
    }

    th { 
      background-color: rgba(15, 23, 42, 0.8); 
      color: #38bdf8;
      font-weight: 600;
    }

    .img-thumb { 
      width: 45px; 
      height: 45px; 
      object-fit: cover; 
      border-radius: 8px; 
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .btn-edit { 
      background: #f59e0b; 
      color: #0f172a; 
      border: none; 
      padding: 6px 12px; 
      border-radius: 6px; 
      cursor: pointer; 
      font-size: 12px; 
      font-weight: bold; 
      margin-right: 5px; 
      transition: background 0.2s ease;
    }
    .btn-edit:hover { background: #d97706; }

    .btn-delete { 
      background: #ef4444; 
      color: white; 
      border: none; 
      padding: 6px 12px; 
      border-radius: 6px; 
      cursor: pointer; 
      font-size: 12px; 
      font-weight: bold;
      transition: background 0.2s ease;
    }
    .btn-delete:hover { background: #dc2626; }

    .badge-cod { 
      background: rgba(148, 163, 184, 0.2); 
      color: #cbd5e1;
      padding: 4px 8px; 
      border-radius: 6px; 
      font-weight: 600; 
      font-size: 12px;
    }

    /* Edit Modal Style */
    .modal { 
      display: none; 
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      background: rgba(15, 23, 42, 0.8); 
      backdrop-filter: blur(8px);
      justify-content: center; 
      align-items: center; 
      z-index: 1000; 
    }

    .modal-content { 
      background: #1e293b; 
      padding: 30px; 
      border-radius: 16px; 
      max-width: 450px; 
      width: 90%; 
      position: relative; 
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
    }

    .close-btn { 
      position: absolute; 
      top: 15px; 
      right: 18px; 
      font-size: 22px; 
      cursor: pointer; 
      border: none; 
      background: none; 
      color: #94a3b8;
    }
    .close-btn:hover { color: #f8fafc; }
  </style>
</head>
<body>

  <!-- TOP SECTION: ORDERS -->
  <div class="layout" style="margin-bottom: 20px;">
    <div class="container" style="flex: 100%;">
      <h2>📦 Customer Orders - Aysha's Choice</h2>
      <table>
        <thead>
          <tr>
            <th>Customer</th>
            <th>Phone</th>
            <th>Area</th>
            <th>Address</th>
            <th>Total Amount</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="ordersTable">
          <!-- Orders loaded dynamically -->
        </tbody>
      </table>
    </div>
  </div>

  <!-- BOTTOM SECTION: PRODUCT MANAGEMENT -->
  <div class="layout">
    <!-- Upload Form -->
    <div class="container">
      <h2>🛠️ Upload New Product</h2>
      <form id="productForm">
        <div class="form-group">
          <label>Product Name</label>
          <input type="text" id="name" placeholder="e.g. Leather Wallet" required>
        </div>
        <div class="form-group">
          <label>Price (BDT)</label>
          <input type="number" id="price" placeholder="e.g. 1200" required>
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="category" required>
            <option value="">Select Category</option>
            <option value="Electronics">Electronics</option>
            <option value="Clothing">Clothing</option>
            <option value="Accessories">Accessories</option>
            <option value="Gadgets">Gadgets</option>
          </select>
        </div>
        <div class="form-group">
          <label>Select Image</label>
          <input type="file" id="imageFile" accept="image/*" required>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="description" rows="3" placeholder="Write product details..."></textarea>
        </div>
        <button type="submit">Upload Product 🚀</button>
      </form>
      <div id="msg"></div>
    </div>

    <!-- Product Table -->
    <div class="container">
      <h2>📋 Existing Products</h2>
      <table>
        <thead>
          <tr>
            <th>Image</th>
            <th>Name</th>
            <th>Price</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="adminProductTable">
          <!-- Products loaded dynamically -->
        </tbody>
      </table>
    </div>
  </div>

  <!-- EDIT MODAL -->
  <div class="modal" id="editModal">
    <div class="modal-content">
      <button class="close-btn" onclick="closeEditModal()">✖</button>
      <h2>✏️ Edit Product</h2>
      <form id="editForm">
        <input type="hidden" id="editId">
        <div class="form-group">
          <label>Product Name</label>
          <input type="text" id="editName" required>
        </div>
        <div class="form-group">
          <label>Price (BDT)</label>
          <input type="number" id="editPrice" required>
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="editCategory" required>
            <option value="Electronics">Electronics</option>
            <option value="Clothing">Clothing</option>
            <option value="Accessories">Accessories</option>
            <option value="Gadgets">Gadgets</option>
          </select>
        </div>
        <div class="form-group">
          <label>Change Image (Optional)</label>
          <input type="file" id="editImageFile" accept="image/*">
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="editDescription" rows="3"></textarea>
        </div>
        <button type="submit" style="background: linear-gradient(135deg, #3b82f6, #2563eb);">Update Product 💾</button>
      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById('productForm');
    const msg = document.getElementById('msg');
    let productsList = [];

    async function fetchOrders() {
      try {
        const res = await fetch('/api/orders');
        const data = await res.json();
        const tbody = document.getElementById('ordersTable');
        tbody.innerHTML = '';

        if (!data.data || data.data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No orders found</td></tr>';
          return;
        }

        data.data.forEach(order => {
          tbody.innerHTML += `
            <tr>
              <td><b>${order.customerName}</b></td>
              <td>${order.phone}</td>
              <td>${order.deliveryZone === 'inside' ? 'Inside Dhaka' : 'Outside Dhaka'}</td>
              <td>${order.address}</td>
              <td><b>৳ ${order.totalAmount}</b></td>
              <td><span class="badge-cod">${order.status}</span></td>
            </tr>`;
        });
      } catch (err) { console.error(err); }
    }

    async function fetchAdminProducts() {
      try {
        const res = await fetch('/api/products');
        const data = await res.json();
        productsList = data.data || [];
        const tbody = document.getElementById('adminProductTable');
        tbody.innerHTML = '';

        if (productsList.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No products found</td></tr>';
          return;
        }

        productsList.forEach(prod => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td><img src="${prod.image}" class="img-thumb"></td>
            <td><b>${prod.name}</b></td>
            <td>৳ ${prod.price}</td>
            <td>
              <button class="btn-edit" onclick="openEditModal('${prod._id}')">Edit ✏️</button>
              <button class="btn-delete" onclick="deleteProduct('${prod._id}')">Delete 🗑️</button>
            </td>
          `;
          tbody.appendChild(tr);
        });
      } catch (err) { console.error(err); }
    }

    function openEditModal(id) {
      const prod = productsList.find(p => p._id === id);
      if (!prod) return;

      document.getElementById('editId').value = prod._id;
      document.getElementById('editName').value = prod.name;
      document.getElementById('editPrice').value = prod.price;
      document.getElementById('editCategory').value = prod.category || 'General';
      document.getElementById('editDescription').value = prod.description || '';

      document.getElementById('editModal').style.display = 'flex';
    }

    function closeEditModal() {
      document.getElementById('editModal').style.display = 'none';
    }

    document.getElementById('editForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const id = document.getElementById('editId').value;
      const formData = new FormData();
      formData.append('name', document.getElementById('editName').value);
      formData.append('price', document.getElementById('editPrice').value);
      formData.append('category', document.getElementById('editCategory').value);
      formData.append('description', document.getElementById('editDescription').value);

      const fileInput = document.getElementById('editImageFile');
      if (fileInput.files[0]) {
        formData.append('imageFile', fileInput.files[0]);
      }

      try {
        const res = await fetch(`/api/products/${id}`, { method: 'PUT', body: formData });
        if (res.ok) {
          alert('Product Updated Successfully! 🎉');
          closeEditModal();
          fetchAdminProducts();
        } else {
          alert('Failed to update product!');
        }
      } catch (err) { console.error(err); }
    });

    async function deleteProduct(id) {
      if (confirm('Are you sure you want to delete this product?')) {
        try {
          const res = await fetch(`/api/products/${id}`, { method: 'DELETE' });
          if (res.ok) {
            fetchAdminProducts();
          } else {
            alert('Failed to delete product!');
          }
        } catch (err) { console.error(err); }
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const fileInput = document.getElementById('imageFile');
      const formData = new FormData();
      formData.append('name', document.getElementById('name').value);
      formData.append('price', document.getElementById('price').value);
      formData.append('category', document.getElementById('category').value);
      formData.append('imageFile', fileInput.files[0]);
      formData.append('description', document.getElementById('description').value);

      msg.style.color = '#38bdf8';
      msg.innerText = '⏳ Uploading...';

      try {
        const response = await fetch('/api/products', { method: 'POST', body: formData });
        const data = await response.json();

        if (response.ok) {
          msg.style.color = '#4ade80';
          msg.innerText = '🎉 ' + data.message;
          form.reset();
          fetchAdminProducts();
        } else {
          msg.style.color = '#f87171';
          msg.innerText = '❌ Error: ' + (data.error || data.message);
        }
      } catch (err) {
        msg.style.color = '#f87171';
        msg.innerText = '❌ Upload Failed!';
      }
    });

    fetchOrders();
    fetchAdminProducts();
  </script>
</body>
</html>
