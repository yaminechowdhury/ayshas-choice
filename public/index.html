<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aysha's Choice - Storefront</title>
  <style>
    * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: #f8f9fa; margin: 0; padding: 20px; }
    
    header { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto 25px auto; flex-wrap: wrap; gap: 15px; }
    header h1 { margin: 0; color: #333; font-size: 26px; }
    .header-actions { display: flex; gap: 10px; align-items: center; }

    .controls { display: flex; gap: 15px; max-width: 1200px; margin: 0 auto 25px auto; flex-wrap: wrap; }
    .search-input { flex: 2; min-width: 200px; padding: 10px 15px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; }
    .category-select { flex: 1; min-width: 150px; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; }

    .btn-action { background: #007bff; color: white; border: none; padding: 9px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; }
    .btn-action:hover { background: #0056b3; }
    .btn-danger { background: #dc3545; }
    .btn-danger:hover { background: #c82333; }

    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto; }
    .product-card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.08); transition: transform 0.2s; display: flex; flex-direction: column; }
    .product-card:hover { transform: translateY(-5px); }
    .product-img { width: 100%; height: 200px; object-fit: cover; background-color: #e9ecef; }
    .product-info { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
    .category-badge { font-size: 11px; background: #e0f2fe; color: #0369a1; padding: 3px 8px; border-radius: 12px; width: fit-content; margin-bottom: 8px; font-weight: bold; text-transform: uppercase; }
    .product-title { font-size: 18px; font-weight: bold; color: #222; margin: 0 0 8px 0; }
    .product-desc { font-size: 13px; color: #666; margin-bottom: 15px; flex-grow: 1; }
    .product-footer { display: flex; justify-content: space-between; align-items: center; }
    .product-price { font-size: 18px; font-weight: bold; color: #28a745; }

    /* Cart Sidebar */
    .cart-sidebar { position: fixed; top: 0; right: -400px; width: 380px; height: 100%; background: white; box-shadow: -4px 0 15px rgba(0,0,0,0.15); transition: right 0.3s ease; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; z-index: 1000; overflow-y: auto; }
    .cart-sidebar.active { right: 0; }
    .cart-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    .cart-items { flex-grow: 1; margin: 15px 0; }
    .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px solid #f1f1f1; padding-bottom: 8px; }
    
    /* Modals */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1001; }
    .modal-content { background: white; padding: 25px; border-radius: 10px; max-width: 400px; width: 90%; position: relative; }
    .close-btn { position: absolute; top: 10px; right: 15px; font-size: 20px; cursor: pointer; border: none; background: none; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
  </style>
</head>
<body>

  <header>
    <h1>🛍️ Aysha's Choice</h1>
    <div class="header-actions">
      <div id="authBtnGroup">
        <button class="btn-action" onclick="openAuthModal('login')">Login 🔑</button>
        <button class="btn-action" style="background:#28a745;" onclick="openAuthModal('signup')">Sign Up 📝</button>
      </div>
      <div id="userInfo" style="display: none;">
        <span id="userName" style="font-weight: bold; margin-right: 10px;"></span>
        <button class="btn-action btn-danger" onclick="logout()">Logout 🚪</button>
      </div>
      <button class="btn-action" onclick="toggleCart()">🛒 Cart (<span id="cartCount">0</span>)</button>
    </div>
  </header>

  <div class="controls">
    <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search products..." oninput="filterProducts()">
    <select id="categoryFilter" class="category-select" onchange="filterProducts()">
      <option value="All">All Categories</option>
      <option value="Electronics">Electronics</option>
      <option value="Clothing">Clothing</option>
      <option value="Accessories">Accessories</option>
      <option value="Gadgets">Gadgets</option>
    </select>
  </div>

  <div class="product-grid" id="productGrid"></div>

  <!-- Cart & Checkout Sidebar -->
  <div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
      <h3>Shopping Cart 🛒</h3>
      <button style="border:none; background:none; font-size:20px; cursor:pointer;" onclick="toggleCart()">✖</button>
    </div>
    <div class="cart-items" id="cartItems">
      <p style="text-align: center; color: #888;">Your cart is empty!</p>
    </div>

    <!-- Checkout Form -->
    <div id="checkoutForm" style="border-top: 2px dashed #ddd; padding-top: 15px; margin-top: 10px;">
      <h4>📋 Order Details</h4>
      <div class="form-group">
        <label>Your Name</label>
        <input type="text" id="custName" placeholder="e.g. Rahim Ahmed" required>
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="text" id="custPhone" placeholder="017xxxxxxxx" required>
      </div>
      <div class="form-group">
        <label>Delivery Area</label>
        <select id="custZone" onchange="updateDeliveryCharge()" required>
          <option value="">-- Select Area --</option>
          <option value="inside">Inside Dhaka (৳ 70)</option>
          <option value="outside">Outside Dhaka (৳ 130)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Full Address</label>
        <textarea id="custAddress" rows="2" placeholder="House/Road, Area, City" disabled required></textarea>
      </div>
      <div class="form-group">
        <label>Payment Method</label>
        <input type="text" value="Cash on Delivery (COD)" disabled style="background:#e9ecef; font-weight:bold;">
      </div>

      <div style="background: #f1f3f5; padding: 10px; border-radius: 5px; margin-bottom: 15px;">
        <p style="margin: 3px 0;">Subtotal: ৳ <span id="cartSubtotal">0</span></p>
        <p style="margin: 3px 0;">Delivery Charge: ৳ <span id="deliveryCharge">0</span></p>
        <h3 style="margin: 5px 0 0 0; color: #28a745;">Total: ৳ <span id="cartTotal">0</span></h3>
      </div>

      <button class="btn-action" style="width: 100%; background: #28a745; padding: 12px; font-size: 16px;" onclick="placeOrder()">Place Order 🚀</button>
    </div>
  </div>

  <!-- Auth Modal (Login / Signup) -->
  <div class="modal" id="authModal">
    <div class="modal-content">
      <button class="close-btn" onclick="closeAuthModal()">✖</button>
      <h3 id="authTitle">Login</h3>
      <form id="authForm">
        <div class="form-group" id="nameGroup" style="display: none;">
          <label>Full Name</label>
          <input type="text" id="authName">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="authEmail" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="authPassword" required>
        </div>
        <button type="submit" class="btn-action" style="width: 100%; margin-top: 10px;" id="authSubmitBtn">Login</button>
      </form>
    </div>
  </div>

  <script>
    let allProducts = [];
    let cart = [];
    let authMode = 'login';

    function checkAuth() {
      const user = localStorage.getItem('user');
      if (user) {
        const uData = JSON.parse(user);
        document.getElementById('authBtnGroup').style.display = 'none';
        document.getElementById('userInfo').style.display = 'block';
        document.getElementById('userName').innerText = '👤 ' + uData.name;
      } else {
        document.getElementById('authBtnGroup').style.display = 'block';
        document.getElementById('userInfo').style.display = 'none';
      }
    }

    function openAuthModal(mode) {
      authMode = mode;
      document.getElementById('authTitle').innerText = mode === 'login' ? 'Login 🔑' : 'Sign Up 📝';
      document.getElementById('nameGroup').style.display = mode === 'signup' ? 'block' : 'none';
      document.getElementById('authSubmitBtn').innerText = mode === 'login' ? 'Login' : 'Register';
      document.getElementById('authModal').style.display = 'flex';
    }

    function closeAuthModal() { document.getElementById('authModal').style.display = 'none'; }

    document.getElementById('authForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('authEmail').value;
      const password = document.getElementById('authPassword').value;
      const name = document.getElementById('authName').value;

      const endpoint = authMode === 'signup' ? '/api/auth/signup' : '/api/auth/login';
      const payload = authMode === 'signup' ? { name, email, password } : { email, password };

      try {
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();

        if (res.ok) {
          alert(data.message);
          if (authMode === 'login') {
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
            checkAuth();
          }
          closeAuthModal();
        } else {
          alert('Error: ' + data.error);
        }
      } catch (err) { console.error(err); }
    });

    function logout() {
      localStorage.clear();
      checkAuth();
    }

    async function loadProducts() {
      const res = await fetch('/api/products');
      const data = await res.json();
      allProducts = data.data || [];
      renderProducts(allProducts);
    }

    function renderProducts(products) {
      const grid = document.getElementById('productGrid');
      grid.innerHTML = '';
      products.forEach(prod => {
        grid.innerHTML += `
          <div class="product-card">
            <img src="${prod.image}" class="product-img" onerror="this.src='https://via.placeholder.com/200'">
            <div class="product-info">
              <span class="category-badge">${prod.category}</span>
              <h3 class="product-title">${prod.name}</h3>
              <p class="product-desc">${prod.description || ''}</p>
              <div class="product-footer">
                <span class="product-price">৳ ${prod.price}</span>
                <button class="btn-action" onclick="addToCart('${prod._id}')">Add to Cart 🛒</button>
              </div>
            </div>
          </div>`;
      });
    }

    function filterProducts() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const cat = document.getElementById('categoryFilter').value;
      const filtered = allProducts.filter(p => p.name.toLowerCase().includes(search) && (cat === 'All' || p.category === cat));
      renderProducts(filtered);
    }

    function addToCart(id) {
      const prod = allProducts.find(p => p._id === id);
      if (prod) { cart.push(prod); updateCartUI(); }
    }

    function removeFromCart(idx) {
      cart.splice(idx, 1);
      updateCartUI();
    }

    function updateCartUI() {
      document.getElementById('cartCount').innerText = cart.length;
      const container = document.getElementById('cartItems');
      container.innerHTML = '';
      
      let subtotal = 0;
      cart.forEach((item, i) => {
        subtotal += Number(item.price);
        container.innerHTML += `
          <div class="cart-item">
            <div><b>${item.name}</b><br><small style="color:#28a745">৳ ${item.price}</small></div>
            <button style="border:none; background:none; color:red; cursor:pointer;" onclick="removeFromCart(${i})">🗑️</button>
          </div>`;
      });

      document.getElementById('cartSubtotal').innerText = subtotal;
      updateDeliveryCharge();
    }

    function updateDeliveryCharge() {
      const zone = document.getElementById('custZone').value;
      const addressInput = document.getElementById('custAddress');
      let charge = 0;

      if (zone === 'inside') {
        charge = 70;
        addressInput.disabled = false;
      } else if (zone === 'outside') {
        charge = 130;
        addressInput.disabled = false;
      } else {
        addressInput.disabled = true;
        addressInput.value = '';
      }

      const subtotal = Number(document.getElementById('cartSubtotal').innerText);
      document.getElementById('deliveryCharge').innerText = charge;
      document.getElementById('cartTotal').innerText = subtotal + charge;
    }

    async function placeOrder() {
      if (cart.length === 0) return alert('Your cart is empty!');

      const customerName = document.getElementById('custName').value;
      const phone = document.getElementById('custPhone').value;
      const deliveryZone = document.getElementById('custZone').value;
      const address = document.getElementById('custAddress').value;
      const subtotal = Number(document.getElementById('cartSubtotal').innerText);

      if (!customerName || !phone || !deliveryZone || !address) {
        return alert('Please fill in all order details!');
      }

      const orderPayload = {
        customerName, phone, deliveryZone, address,
        items: cart.map(item => ({ productId: item._id, name: item.name, price: item.price })),
        subtotal
      };

      try {
        const res = await fetch('/api/orders', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(orderPayload)
        });

        if (res.ok) {
          alert('Order Placed Successfully via Cash on Delivery! 🎉');
          cart = [];
          updateCartUI();
          toggleCart();
        } else {
          alert('Failed to place order!');
        }
      } catch (err) { console.error(err); }
    }

    function toggleCart() { document.getElementById('cartSidebar').classList.toggle('active'); }

    checkAuth();
    loadProducts();
  </script>
</body>
</html>
